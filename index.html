<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kraninger</title>
    <link rel="stylesheet" href="./scss/custome.css" />
  </head>
  <body>
    <header>
      <div class="overlay"></div>
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <span class="brand">El Soñador</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="#home">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#about">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#explore">Explore</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#contact">Contact</a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="#"
                  data-bs-toggle="modal"
                  data-bs-target="#modal"
                  >Book</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <section
        id="home"
        class="header-banner d-flex justify-content-center align-items-center"
      >
        <div class="header-content container text-white text-center">
          <h3 class="text-uppercase display-5 m-0">Kraninger s.r.o.</h3>
          <h1 class="text-uppercase display-1">Prace vseho druhu</h1>
          <!-- <p class="d-none d-md-block">Southern Europe best trip experience</p> -->
          <button
            type="button"
            class="btn btn-lg btn-primary text-uppercase px-5"
            data-bs-toggle="modal"
            data-bs-target="#modal"
          >
            Cookies
          </button>
        </div>
      </section>
    </header>

    <main></main>

    <footer>
      <div class="foot">
        <div>&copy;veetek 2024</div>
      </div>
    </footer>
    <!-- modal -->
    <div
      class="modal fade"
      id="modal"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="staticBackdropLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark">
          <div class="modal-header">
            <h1 class="modal-title fs-5 text-primary" id="staticBackdropLabel">
              Book your journey
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="book-email" class="form-label">Email address</label>
              <input
                type="email"
                class="form-control"
                id="book-email"
                placeholder="name@example.com"
              />
            </div>
            <div class="mb-3">
              <label for="book-name" class="form-label">Your name</label>
              <input
                type="text"
                class="form-control"
                id="book-name"
                placeholder="Joanne English"
              />
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label for="book-from" class="form-label">From</label>
                <input
                  type="date"
                  class="form-control"
                  id="book-from"
                  placeholder="name@example.com"
                />
              </div>
              <div class="col-6">
                <label for="book-to" class="form-label">To</label>
                <input
                  type="date"
                  class="form-control"
                  id="book-to"
                  placeholder="name@example.com"
                />
              </div>
            </div>
            <div class="mb-3">
              <label for="book-number" class="form-label"
                >Number of travellers</label
              >
              <input
                type="number"
                class="form-control"
                id="book-number"
                placeholder="1"
                min="1"
                max="20"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              Book
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navLinks = document.querySelectorAll('.nav-link');
            const navbarMenu = document.querySelector('#navbarNav');
            const bsCollapse = new bootstrap.Collapse(navbarMenu, { toggle: false });

            const collapseNavbar = () => {
                if (window.innerWidth < 992) {
                    bsCollapse.hide();
                }
            };

            navLinks.forEach(link => link.addEventListener('click', collapseNavbar));
        });
        // document.addEventListener("DOMContentLoaded", () => {
        //     const navLinks = document.querySelectorAll('.nav-link');
        //     const navbarMenu = document.querySelector('#navbarNav');

        //     const collapseNavbar = () => {
        //         if (window.innerWidth < 992) {
        //             if (navbarMenu.classList.contains('show')) {
        //                 navbarMenu.classList.remove('show');
        //             }
        //         }
        //     };

        //     navLinks.forEach(link => link.addEventListener('click', collapseNavbar));
        // });
    </script>
    
  </body>
</html>
